<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day Jen 💜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Lora', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    padding: 20px;
    text-align: center;
    overflow: hidden;
  }
  .page.active {
    opacity: 1;
    pointer-events: all;
  }

  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    font-size: clamp(14px, 3vw, 24px);
    animation: float linear infinite;
    opacity: 0;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .outline-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(38px, 10vw, 90px);
    color: #000;
    -webkit-text-stroke: 3px #9b30ff;
    text-stroke: 3px #9b30ff;
    text-shadow:
      0 0 20px rgba(155, 48, 255, 0.7),
      0 0 40px rgba(155, 48, 255, 0.4);
    line-height: 1.1;
    letter-spacing: 2px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px rgba(155,48,255,.7), 0 0 40px rgba(155,48,255,.4); }
    50%       { text-shadow: 0 0 35px rgba(155,48,255,1),  0 0 70px rgba(155,48,255,.6), 0 0 100px rgba(155,48,255,.3); }
  }

  .emoji-row {
    font-size: clamp(20px, 5vw, 36px);
    letter-spacing: 4px;
    margin: 14px 0;
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: translateX(0); }
    50%       { transform: translateX(6px); }
  }

  .click-btn {
    margin-top: 24px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid #9b30ff;
    color: #9b30ff;
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 3.5vw, 22px);
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    box-shadow: 0 0 18px rgba(155,48,255,.5), inset 0 0 18px rgba(155,48,255,.1);
    transition: all 0.3s ease;
    animation: btnGlow 2.5s ease-in-out infinite;
  }
  .click-btn:hover {
    background: rgba(155,48,255,.15);
    box-shadow: 0 0 35px rgba(155,48,255,.9), inset 0 0 25px rgba(155,48,255,.2);
    transform: scale(1.05);
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 0 18px rgba(155,48,255,.5), inset 0 0 18px rgba(155,48,255,.1); }
    50%       { box-shadow: 0 0 30px rgba(155,48,255,.8), inset 0 0 25px rgba(155,48,255,.2); }
  }

  .message-box {
    max-width: 640px;
    width: 100%;
    background: rgba(155, 48, 255, 0.06);
    border: 1px solid rgba(155,48,255,.35);
    border-radius: 16px;
    padding: clamp(20px, 5vw, 40px);
    box-shadow: 0 0 40px rgba(155,48,255,.2), inset 0 0 30px rgba(155,48,255,.05);
  }
  .message-text {
    font-size: clamp(16px, 3.2vw, 24px);
    color: #f0d9ff;
    line-height: 1.85;
    font-style: italic;
    text-shadow: 0 0 10px rgba(155,48,255,.3);
  }
  .message-text span.highlight {
    color: #cc80ff;
    font-style: normal;
    font-weight: 600;
  }
  .deco-row {
    font-size: clamp(18px, 4vw, 28px);
    letter-spacing: 6px;
    margin: 12px 0;
  }

  .love-line {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(22px, 5vw, 42px);
    color: #000;
    -webkit-text-stroke: 2px #cc80ff;
    text-stroke: 2px #cc80ff;
    text-shadow: 0 0 15px rgba(204,128,255,.7);
    margin-top: 18px;
    animation: titlePulse 3s ease-in-out infinite;
    letter-spacing: 2px;
  }

  .burst {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    z-index: 999;
    animation: burstAnim 0.8s ease-out forwards;
  }
  @keyframes burstAnim {
    0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
    100% { transform: scale(2.5) rotate(180deg); opacity: 0; }
  }

  #page2 { overflow-y: auto; padding: 30px 20px; justify-content: flex-start; padding-top: 40px; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="particles" id="p1particles"></div>

  <div class="emoji-row">⭐ ✨ ⭐ ✨ ⭐ ✨ ⭐ ✨ ⭐</div>
  <div class="outline-title">HAPPY</div>
  <div class="outline-title">MOTHER'S DAY</div>
  <div class="emoji-row" style="animation-delay:.4s">🌸 🌺 🌹 💐 🌷 💮 🌼 🌸 🌺</div>

  <button class="click-btn" onclick="goTo(2)">✨ Click ✨</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="particles" id="p2particles"></div>

  <div class="deco-row">⭐ ✨ 🌸 😊 🌺 ✨ ⭐ 🌹 😄 💐 ⭐</div>
  <div class="deco-row" style="margin-bottom:16px">🌷 😍 ✨ 🌼 ⭐ 🌸 😊 ✨ 💮 ⭐</div>

  <div class="message-box">
    <p class="message-text">
      <span class="highlight">Happy Mother's Day Jen!</span>
      <br><br>
      I hope you have a
      <span class="highlight">flawless</span>,
      <span class="highlight">fantastic</span>
      day today! 💜
    </p>
  </div>

  <div class="deco-row" style="margin-top:16px">😘 🌺 ⭐ ✨ 😊 💐 🌹 ✨ ⭐ 🌸 😄</div>
  <div class="deco-row">✨ 💮 ⭐ 🌷 😍 ⭐ ✨ 🌼 😊 ⭐ ✨</div>

  <button class="click-btn" style="margin-top:20px;margin-bottom:30px" onclick="goTo(3)">✨ Click Here ✨</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="particles" id="p3particles"></div>

  <div class="emoji-row">⭐ ✨ ⭐ ✨ ⭐ ✨ ⭐ ✨ ⭐</div>
  <div class="outline-title">HAPPY</div>
  <div class="outline-title">MOTHER'S DAY</div>
  <div class="emoji-row" style="animation-delay:.4s">🌸 🌺 🌹 💐 🌷 💮 🌼 🌸 🌺</div>


</div>

<script>
  const sets = {
    p1particles: ['⭐','✨','🌸','🌺','🌹','💐','🌷','💮','🌼'],
    p2particles: ['⭐','✨','🌸','😊','😄','😍','😘','💜','🌺','🌹','💐'],
    p3particles: ['⭐','✨','🌸','🌺','🌹','💐','🌷','💜','💮','🌼'],
  };

  function spawnParticles(containerId, emojis, count) {
    const el = document.getElementById(containerId);
    for (let i = 0; i < count; i++) {
      const span = document.createElement('span');
      span.className = 'particle';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (8 + Math.random() * 14) + 's';
      span.style.animationDelay    = (Math.random() * 12) + 's';
      span.style.fontSize = (14 + Math.random() * 20) + 'px';
      el.appendChild(span);
    }
  }

  Object.entries(sets).forEach(([id, emojis]) => spawnParticles(id, emojis, 28));

  function goTo(num) {
    const burst = document.createElement('div');
    burst.className = 'burst';
    burst.textContent = '💜';
    burst.style.left = '50vw';
    burst.style.top  = '50vh';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 900);

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + num).classList.add('active');
    document.getElementById('page' + num).scrollTop = 0;
  }
</script>
</body>
</html>
